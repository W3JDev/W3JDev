name: Generate Snake Game
on:
  schedule:
    - cron: "0 */12 * * *"  # Every 12 hours
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Generate Snake Animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: W3JDev
          outputs: |
            assets/images/github-contribution-grid-snake.svg
            assets/images/github-contribution-grid-snake-dark.svg?palette=github-dark
            
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add assets/images/
          git diff --staged --quiet || git commit -m "🐍 Update snake animation"
          git push