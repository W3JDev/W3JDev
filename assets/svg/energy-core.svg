<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="energyGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0080FF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0040FF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Rotating energy rings -->
  <g transform-origin="150 150">
    <circle cx="150" cy="150" r="80" fill="none" stroke="url(#energyGradient)" stroke-width="3" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="150" cy="150" r="100" fill="none" stroke="url(#energyGradient)" stroke-width="2" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" 
                        values="360 150 150; 0 150 150" dur="12s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="150" cy="150" r="120" fill="none" stroke="url(#energyGradient)" stroke-width="1" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="16s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Central core -->
  <circle cx="150" cy="150" r="30" fill="url(#energyGradient)">
    <animate attributeName="r" values="30;35;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Energy sparks -->
  <circle cx="150" cy="80" r="3" fill="#00D8FF">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 150 150; 360 150 150" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="220" cy="150" r="2" fill="#00D8FF">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 150 150; 360 150 150" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="80" cy="150" r="2.5" fill="#00D8FF">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 150 150; 360 150 150" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>