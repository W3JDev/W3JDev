<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Luxury energy core with rotating rings and particle emissions">
  <defs>
    <!-- JEWEL Theme Energy Gradients -->
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#00D8FF;stop-opacity:0.9" />
      <stop offset="70%" style="stop-color:#8B5CF6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0A0E27;stop-opacity:0.3" />
    </radialGradient>
    
    <radialGradient id="ringGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#C0C0C0;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.4" />
    </radialGradient>
    
    <radialGradient id="particleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0" />
    </radialGradient>
    
    <!-- Luxury glow filters -->
    <filter id="energyGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="intenseGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer rotating energy rings -->
  <g transform-origin="150 150">
    <!-- Outermost ring -->
    <circle cx="150" cy="150" r="130" fill="none" stroke="url(#ringGradient)" stroke-width="2" opacity="0.4" filter="url(#energyGlow)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="20s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Second ring -->
    <circle cx="150" cy="150" r="110" fill="none" stroke="url(#ringGradient)" stroke-width="3" opacity="0.5" filter="url(#energyGlow)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="360 150 150; 0 150 150" dur="15s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Third ring -->
    <circle cx="150" cy="150" r="90" fill="none" stroke="url(#ringGradient)" stroke-width="2" opacity="0.6" filter="url(#energyGlow)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="25s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Inner ring -->
    <circle cx="150" cy="150" r="70" fill="none" stroke="url(#ringGradient)" stroke-width="4" opacity="0.7" filter="url(#energyGlow)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="360 150 150; 0 150 150" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Central energy core -->
  <circle cx="150" cy="150" r="40" fill="url(#coreGradient)" filter="url(#intenseGlow)">
    <animate attributeName="r" values="35;45;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Pulsing inner core -->
  <circle cx="150" cy="150" r="25" fill="url(#coreGradient)" opacity="0.9">
    <animate attributeName="r" values="20;30;20" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Core energy symbol -->
  <text x="150" y="160" font-family="monospace" font-size="24" fill="#FFD700" text-anchor="middle" font-weight="bold">
    ⚡
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </text>
  
  <!-- Radiating energy particles -->
  <g transform-origin="150 150">
    <circle cx="150" cy="50" r="3" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="250" cy="150" r="2.5" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="150" cy="250" r="3" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="50" cy="150" r="2.5" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 150 150; 360 150 150" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Diagonal energy particles -->
  <g transform-origin="150 150">
    <circle cx="215" cy="85" r="2" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="45 150 150; 405 150 150" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="215" cy="215" r="2" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="135 150 150; 495 150 150" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="85" cy="215" r="2" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="225 150 150; 585 150 150" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="85" cy="85" r="2" fill="url(#particleGradient)">
      <animateTransform attributeName="transform" type="rotate" 
                        values="315 150 150; 675 150 150" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Energy pulse waves -->
  <circle cx="150" cy="150" r="60" fill="none" stroke="url(#ringGradient)" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="50;80;50" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
  </circle>
  
  <!-- Energy sparks -->
  <circle cx="150" cy="80" r="3" fill="#00D8FF">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 150 150; 360 150 150" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="220" cy="150" r="2" fill="#00D8FF">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 150 150; 360 150 150" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="80" cy="150" r="2.5" fill="#00D8FF">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 150 150; 360 150 150" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>