<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="particleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D8FF;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Floating particles with different animations -->
  <circle cx="100" cy="100" r="2" fill="url(#particleGrad)">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; 20,-10; 0,0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="200" cy="150" r="1.5" fill="url(#particleGrad)">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; -15,15; 0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="300" cy="80" r="2.5" fill="url(#particleGrad)">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; 10,20; 0,0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="450" cy="200" r="1" fill="url(#particleGrad)">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; -25,-5; 0,0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="600" cy="120" r="2" fill="url(#particleGrad)">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; 15,-20; 0,0" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="750" cy="180" r="1.8" fill="url(#particleGrad)">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; -10,10; 0,0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>