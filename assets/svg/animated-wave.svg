<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none" role="img" aria-label="Elegant flowing wave divider with JEWEL theme colors">
  <defs>
    <!-- Luxury wave gradients -->
    <linearGradient id="primaryWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#00D8FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0E27;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:0.7" />
      <stop offset="33%" style="stop-color:#C0C0C0;stop-opacity:0.7" />
      <stop offset="66%" style="stop-color:#8B5CF6;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#00D8FF;stop-opacity:0.7" />
    </linearGradient>
    
    <linearGradient id="accentWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#00D8FF;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  
  <!-- Primary wave layer -->
  <path d="M0,60 C300,120 900,0 1200,60 L1200,120 L0,120 Z" fill="url(#primaryWave)">
    <animate attributeName="d" 
             values="M0,60 C300,120 900,0 1200,60 L1200,120 L0,120 Z;
                     M0,60 C300,0 900,120 1200,60 L1200,120 L0,120 Z;
                     M0,60 C300,120 900,0 1200,60 L1200,120 L0,120 Z"
             dur="8s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Secondary wave layer -->
  <path d="M0,80 C400,40 800,120 1200,80 L1200,120 L0,120 Z" fill="url(#secondaryWave)">
    <animate attributeName="d" 
             values="M0,80 C400,40 800,120 1200,80 L1200,120 L0,120 Z;
                     M0,80 C400,120 800,40 1200,80 L1200,120 L0,120 Z;
                     M0,80 C400,40 800,120 1200,80 L1200,120 L0,120 Z"
             dur="6s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Accent shimmer layer -->
  <path d="M0,90 C200,70 1000,110 1200,90 L1200,120 L0,120 Z" fill="url(#accentWave)">
    <animate attributeName="d" 
             values="M0,90 C200,70 1000,110 1200,90 L1200,120 L0,120 Z;
                     M0,90 C200,110 1000,70 1200,90 L1200,120 L0,120 Z;
                     M0,90 C200,70 1000,110 1200,90 L1200,120 L0,120 Z"
             dur="4s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </path>
</svg>