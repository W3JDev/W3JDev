<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
  </defs>
  <path d="M0,60 C300,120 900,0 1200,60 L1200,120 L0,120 Z" fill="url(#waveGradient)">
    <animate attributeName="d" 
             values="M0,60 C300,120 900,0 1200,60 L1200,120 L0,120 Z;
                     M0,60 C300,0 900,120 1200,60 L1200,120 L0,120 Z;
                     M0,60 C300,120 900,0 1200,60 L1200,120 L0,120 Z"
             dur="4s" 
             repeatCount="indefinite"/>
  </path>
</svg>