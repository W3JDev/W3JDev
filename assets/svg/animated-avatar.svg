<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066CC;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Animated rotating ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#avatarGradient)" stroke-width="2" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 50 50; 360 50 50" dur="8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Inner avatar circle -->
  <circle cx="50" cy="50" r="35" fill="url(#avatarGradient)" filter="url(#glow)">
    <animate attributeName="r" values="35;37;35" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Tech symbols inside -->
  <text x="50" y="58" font-family="monospace" font-size="24" fill="white" text-anchor="middle">⚡</text>
  
  <!-- Hover effect simulation -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00D8FF" stroke-width="0" opacity="0">
    <animate attributeName="stroke-width" values="0;3;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>