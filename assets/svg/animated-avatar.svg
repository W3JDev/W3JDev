<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Animated professional avatar with luxury golden ring">
  <defs>
    <!-- Luxury JEWEL gradients -->
    <radialGradient id="avatarCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#00D8FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
    </radialGradient>
    
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="silverAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0C0C0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:0.8" />
    </linearGradient>
    
    <!-- Luxury glow effect -->
    <filter id="luxuryGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer rotating golden ring -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="url(#goldRing)" stroke-width="3" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 60 60; 360 60 60" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Middle silver decorative ring -->
  <circle cx="60" cy="60" r="47" fill="none" stroke="url(#silverAccent)" stroke-width="2" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" 
                      values="360 60 60; 0 60 60" dur="15s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Inner rotating element -->
  <circle cx="60" cy="60" r="42" fill="none" stroke="url(#goldRing)" stroke-width="1" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" 
                      values="0 60 60; 360 60 60" dur="25s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main avatar circle with breathing effect -->
  <circle cx="60" cy="60" r="35" fill="url(#avatarCore)" filter="url(#luxuryGlow)">
    <animate attributeName="r" values="35;38;35" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Professional tech icon -->
  <text x="60" y="70" font-family="monospace" font-size="28" fill="#FFD700" text-anchor="middle" font-weight="bold">
    ⚡
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Subtle rotating decorative elements -->
  <g transform-origin="60 60">
    <circle cx="60" cy="25" r="2" fill="url(#goldRing)" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 60 60; 360 60 60" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="95" cy="60" r="1.5" fill="url(#silverAccent)" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 60 60; 360 60 60" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="95" r="2" fill="url(#goldRing)" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 60 60; 360 60 60" dur="30s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="60" r="1.5" fill="url(#silverAccent)" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" 
                        values="0 60 60; 360 60 60" dur="30s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Pulsing outer aura -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#goldRing)" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="48;52;48" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00D8FF" stroke-width="0" opacity="0">
    <animate attributeName="stroke-width" values="0;3;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>