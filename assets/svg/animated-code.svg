<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 250" role="img" aria-label="Animated code typing with JEWEL theme syntax highlighting">
  <defs>
    <!-- JEWEL Theme Code Gradients -->
    <linearGradient id="codeBackground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="terminalGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D8FF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00D8FF;stop-opacity:0.3" />
    </linearGradient>
    
    <!-- Luxury glow filter -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Terminal background -->
  <rect width="100%" height="100%" fill="url(#codeBackground)" rx="10" ry="10" />
  
  <!-- Terminal header bar -->
  <rect x="0" y="0" width="100%" height="30" fill="url(#terminalGlow)" />
  <circle cx="20" cy="15" r="5" fill="#FF6B6B" />
  <circle cx="40" cy="15" r="5" fill="#FFE66D" />
  <circle cx="60" cy="15" r="5" fill="#4ECDC4" />
  
  <!-- Terminal title -->
  <text x="100" y="20" font-family="monospace" font-size="12" fill="#C0C0C0" font-weight="bold">
    W3JDev Terminal - Luxury Code Session
  </text>
  
  <!-- Animated code lines with luxury styling -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" filter="url(#textGlow)">
    
    <!-- Line 1: Function declaration -->
    <text x="20" y="60">
      <tspan fill="#8B5CF6" font-weight="bold">function</tspan>
      <tspan fill="#C0C0C0"> </tspan>
      <tspan fill="#FFD700" font-weight="bold">createLuxuryExperience</tspan>
      <tspan fill="#C0C0C0">(</tspan>
      <tspan fill="#00D8FF">passion</tspan>
      <tspan fill="#C0C0C0">, </tspan>
      <tspan fill="#00D8FF">innovation</tspan>
      <tspan fill="#C0C0C0">) {</tspan>
      <animate attributeName="opacity" values="0;1;1;1;1;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 2: Variable declaration -->
    <text x="40" y="85">
      <tspan fill="#8B5CF6" font-weight="bold">const</tspan>
      <tspan fill="#C0C0C0"> </tspan>
      <tspan fill="#00D8FF">dreamProject</tspan>
      <tspan fill="#C0C0C0"> = </tspan>
      <tspan fill="#FFD700">'Revolutionary AI Solution'</tspan>
      <tspan fill="#C0C0C0">;</tspan>
      <animate attributeName="opacity" values="0;0;1;1;1;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 3: Another variable -->
    <text x="40" y="110">
      <tspan fill="#8B5CF6" font-weight="bold">const</tspan>
      <tspan fill="#C0C0C0"> </tspan>
      <tspan fill="#00D8FF">techStack</tspan>
      <tspan fill="#C0C0C0"> = [</tspan>
      <tspan fill="#FFD700">'React'</tspan>
      <tspan fill="#C0C0C0">, </tspan>
      <tspan fill="#FFD700">'AI'</tspan>
      <tspan fill="#C0C0C0">, </tspan>
      <tspan fill="#FFD700">'Cloud'</tspan>
      <tspan fill="#C0C0C0">];</tspan>
      <animate attributeName="opacity" values="0;0;0;1;1;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 4: Return statement -->
    <text x="40" y="135">
      <tspan fill="#8B5CF6" font-weight="bold">return</tspan>
      <tspan fill="#C0C0C0"> {</tspan>
      <animate attributeName="opacity" values="0;0;0;0;1;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 5: Object property -->
    <text x="60" y="160">
      <tspan fill="#00D8FF">success</tspan>
      <tspan fill="#C0C0C0">: </tspan>
      <tspan fill="#FFD700">true</tspan>
      <tspan fill="#C0C0C0">,</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 6: Object property -->
    <text x="60" y="185">
      <tspan fill="#00D8FF">impact</tspan>
      <tspan fill="#C0C0C0">: </tspan>
      <tspan fill="#FFD700">'Game-changing'</tspan>
      <tspan fill="#C0C0C0">,</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 7: Object property -->
    <text x="60" y="210">
      <tspan fill="#00D8FF">status</tspan>
      <tspan fill="#C0C0C0">: </tspan>
      <tspan fill="#FFD700">'Building the future...'</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 8: Closing -->
    <text x="40" y="235">
      <tspan fill="#C0C0C0">  };</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;1" dur="12s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 9: Closing function -->
    <text x="20" y="260">
      <tspan fill="#C0C0C0">}</tspan>
      <animate attributeName="opacity" values="0;0;0;0;0;1" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Animated cursor -->
  <rect x="80" y="248" width="2" height="16" fill="#FFD700">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; 120,0; 240,0; 360,0; 480,0; 600,0" 
                      dur="12s" repeatCount="indefinite" />
  </rect>
  
  <!-- Luxury accent borders -->
  <rect x="5" y="5" width="690" height="240" fill="none" stroke="url(#terminalGlow)" stroke-width="1" rx="8" ry="8" />
  
  <!-- Floating particles for ambiance -->
  <circle cx="600" cy="50" r="1" fill="#FFD700" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; -20,10; 0,0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="650" cy="150" r="0.8" fill="#00D8FF" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; -15,-15; 0,0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
      <tspan> passion + creativity + </tspan>
      <tspan fill="#FFE66D">'☕'</tspan>
      <tspan>;</tspan>
      <animate attributeName="opacity" values="0;0;0;1" dur="6s" repeatCount="indefinite"/>
    </text>
    
    <!-- Line 5 -->
    <text x="20" y="110">
      <tspan>}</tspan>
      <animate attributeName="opacity" values="0;0;0;1" dur="6s" repeatCount="indefinite"/>
    </text>
    
    <!-- Cursor -->
    <rect x="35" y="115" width="2" height="15" fill="#00D8FF">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Floating brackets -->
  <text x="500" y="50" font-family="monospace" font-size="24" fill="#00D8FF" opacity="0.3">
    { }
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; 10,-5; 0,0" dur="4s" repeatCount="indefinite"/>
  </text>
  
  <text x="480" y="120" font-family="monospace" font-size="18" fill="#00D8FF" opacity="0.4">
    [ ]
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; -8,8; 0,0" dur="5s" repeatCount="indefinite"/>
  </text>
  
  <text x="520" y="90" font-family="monospace" font-size="20" fill="#00D8FF" opacity="0.2">
    ( )
    <animateTransform attributeName="transform" type="translate" 
                      values="0,0; 5,10; 0,0" dur="3s" repeatCount="indefinite"/>
  </text>
</svg>